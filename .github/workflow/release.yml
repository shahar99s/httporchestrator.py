name: release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-n-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Release
        uses: pypa/gh-action-pypi-publish@release/v1
